services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tracking
      POSTGRES_USER: tracking
      POSTGRES_PASSWORD: tracking
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracking"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tracking
      SPRING_DATASOURCE_USERNAME: tracking
      SPRING_DATASOURCE_PASSWORD: tracking
      APP_API_KEY: local-dev-api-key
    ports:
      - "8080:8080"

volumes:
  pgdata:
